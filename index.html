<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdScenes Organiser | Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-body: #F9FAFB;         
            --bg-surface: #FFFFFF;
            --text-main: #111827;    
            --text-muted: #4B5563;  
            --text-light: #9CA3AF;   
            --brand: #0F172A; 
            --brand-glow: rgba(15, 23, 42, 0.1);
            --border: #E5E7EB;
            
            /* Enterprise Status Colors */
            --s-draft-bg: #F3F4F6; --s-draft-fg: #4B5563;
            --s-wip-bg: #FEF3C7;   --s-wip-fg: #B45309;
            --s-ready-bg: #D1FAE5; --s-ready-fg: #047857;
            --s-posted-bg: #DBEAFE; --s-posted-fg: #1D4ED8;

            /* Elegant Tag Colors */
            --t-anchor-bg: #F3E8FF; --t-anchor-fg: #7E22CE;
            --t-engage-bg: #FCE7F3; --t-engage-fg: #BE185D;
            --t-edu-bg: #E0F2FE;    --t-edu-fg: #0369A1;
            --t-promo-bg: #ECFDF5;  --t-promo-fg: #047857;
            --t-std-bg: #F3F4F6;    --t-std-fg: #4B5563;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-modal: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-y: scroll; }
        .container { max-width: 1400px; margin: 0 auto; width: 100%; padding: 0 40px; }

        /* --- AUTH --- */
        #authOverlay { position: fixed; inset: 0; background: var(--bg-body); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 48px; border-radius: 16px; box-shadow: var(--shadow-modal); width: 400px; border: 1px solid var(--border); }
        .auth-logo { font-weight: 800; font-size: 24px; letter-spacing: -0.03em; color: var(--text-main); margin-bottom: 32px; text-align: center; }
        .auth-logo span { color: var(--text-light); font-weight: 400; }
        .auth-input { width: 100%; padding: 12px 16px; border-radius: 8px; background: white; border: 1px solid var(--border); font-size: 14px; margin-bottom: 16px; transition: all 0.2s; }
        .auth-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }
        .auth-btn { width: 100%; padding: 12px; border-radius: 8px; background: var(--brand); color: white; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; margin-bottom: 12px; }
        .auth-btn:hover { background: #000; }

        /* --- HEADER --- */
        .header { height: 64px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; align-items: center; box-shadow: var(--shadow-sm); }
        .header-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.03em; color: var(--text-main); cursor: pointer; }
        .logo span { color: var(--text-light); font-weight: 400; }
        .actions { display: flex; gap: 12px; align-items: center; }

        .btn { height: 36px; padding: 0 16px; border-radius: 8px; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s var(--ease); border: 1px solid transparent; background: white; color: var(--text-main); border-color: var(--border); box-shadow: var(--shadow-sm); }
        .btn:hover { background: #F9FAFB; border-color: #D1D5DB; }
        .btn-primary { background: var(--brand); color: white; border: none; }
        .btn-primary:hover { background: #000; }
        .icon { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* --- MAIN TOOLBAR --- */
        .main-content { padding-top: 40px; padding-bottom: 80px; }
        .toolbar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; }
        .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-main); }
        .page-sub { font-size: 14px; color: var(--text-muted); margin-top: 6px; }
        .view-switch { background: #F3F4F6; padding: 4px; border-radius: 10px; display: flex; gap: 4px; border: 1px solid var(--border); }
        .switch-btn { padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border: none; background: transparent; transition: all 0.2s; }
        .switch-btn.active { background: white; color: var(--text-main); box-shadow: var(--shadow-sm); }

        /* --- VIEWS --- */
        .view-panel { display: none; animation: fadeIn 0.3s var(--ease); }
        .view-panel.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

        /* TAGS & PILLS (Fixed Stretching) */
        .tag-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; width: max-content; }
        .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; width: max-content; transition: filter 0.2s; border: 1px solid rgba(0,0,0,0.05); }
        .status-pill:hover { filter: brightness(0.95); cursor: pointer; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }

        /* LIST VIEW */
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
        .data-table th { text-align: left; padding: 16px 24px; font-size: 12px; font-weight: 600; color: var(--text-muted); background: #F9FAFB; border-bottom: 1px solid var(--border); }
        .data-table td { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; color: var(--text-main); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #F9FAFB; cursor: pointer; }
        .cell-main { font-weight: 600; color: var(--text-main); margin-bottom: 4px; margin-top: 8px; font-size: 15px; }
        .cell-sub { font-size: 13px; color: var(--text-muted); max-width: 400px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* ROADMAP BOARD */
        .roadmap-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; overflow-x: auto; padding-bottom: 24px; align-items: start; }
        .roadmap-col { display: flex; flex-direction: column; gap: 16px; }
        .col-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        .col-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .col-count { font-size: 12px; font-weight: 600; color: var(--text-main); background: #F3F4F6; padding: 2px 8px; border-radius: 12px; }
        
        .road-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 20px; box-shadow: var(--shadow-card); cursor: pointer; transition: all 0.2s var(--ease); display: flex; flex-direction: column; gap: 12px; }
        .road-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: #D1D5DB; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .card-title { font-size: 15px; font-weight: 700; color: var(--text-main); line-height: 1.3; }
        .card-snippet { font-size: 13px; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .empty-zone { border: 1px dashed #D1D5DB; border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; color: var(--text-light); font-size: 13px; font-weight: 500; background: transparent; }

        /* CALENDAR */
        .cal-frame { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 24px; box-shadow: var(--shadow-card); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .cal-title { font-size: 18px; font-weight: 700; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); width: 100%; border-top: 1px solid var(--border); border-left: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .cal-head-cell { background: #F9FAFB; padding: 12px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .cal-cell { min-width: 0; background: white; min-height: 120px; padding: 8px; cursor: pointer; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: background 0.1s; display: flex; flex-direction: column; gap: 4px; }
        .cal-cell:hover { background: #F9FAFB; }
        .cal-num { font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 4px; padding-left: 4px; }
        .cal-cell.today .cal-num { color: var(--brand); font-weight: 800; }
        .cal-event { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- MODALS --- */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 500; display: none; align-items: center; justify-content: center; }
        .overlay.active { display: flex; }
        .modal { background: white; width: 600px; border-radius: 16px; box-shadow: var(--shadow-modal); overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #F9FAFB; }
        .modal-title { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .modal-close { background: transparent; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .modal-body { padding: 24px; overflow-y: auto; }
        
        .field { margin-bottom: 20px; }
        .field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .studio-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 14px; font-family: inherit; transition: all 0.2s; }
        .studio-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }
        .field-row { display: flex; gap: 16px; }
        .field-col { flex: 1; }
        
        .modal-foot { padding: 16px 24px; background: #F9FAFB; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .popover { position: absolute; top: calc(100% + 8px); right: 0; background: white; border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow-card); min-width: 200px; padding: 8px; display: none; z-index: 200; }
        .pop-item { padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; color: var(--text-main); font-weight: 500; }
        .pop-item:hover { background: #F3F4F6; }
        
        .toast { position: fixed; bottom: 32px; right: 32px; background: var(--brand); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 1000; box-shadow: var(--shadow-card); }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <div class="auth-logo">adscenes <span>organiser</span></div>
            <div id="loginForm">
                <input type="email" id="authEmail" class="auth-input" placeholder="Email Address">
                <input type="password" id="authPass" class="auth-input" placeholder="Password">
                <button class="auth-btn" id="authMainBtn" onclick="handleAuth()">Sign In</button>
            </div>
            <div id="authError" style="color: #EF4444; font-size: 13px; text-align: center; margin-top: 12px; display: none;"></div>
        </div>
    </div>

    <header class="header">
        <div class="container header-inner">
            <div class="logo">adscenes <span>organiser</span></div>
            <div class="actions">
                <div style="position: relative;">
                    <button class="btn" onclick="toggle('clientPop')">
                        <span id="currentClient">All Clients</span>
                        <svg class="icon" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                    <div id="clientPop" class="popover"></div>
                </div>
                <div style="position: relative;">
                    <button class="btn" onclick="toggle('menuPop')">
                        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    </button>
                    <div id="menuPop" class="popover">
                        <div class="pop-item" style="color:#EF4444;" onclick="logout()">Sign Out</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openModal()">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>New Campaign</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="toolbar">
                <div>
                    <h1 class="page-title">Content Studio</h1>
                    <div class="page-sub" id="subtitle">Syncing securely...</div>
                </div>
                <div class="view-switch">
                    <button class="switch-btn active" onclick="setView('list', this)">List</button>
                    <button class="switch-btn" onclick="setView('roadmap', this)">Board</button>
                    <button class="switch-btn" onclick="setView('cal', this)">Calendar</button>
                </div>
            </div>

            <div id="view-list" class="view-panel active">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 45%;">Campaign</th>
                            <th style="width: 15%;">Status</th>
                            <th style="width: 15%;">Client</th>
                            <th style="width: 10%;">Assets</th>
                            <th style="width: 15%; text-align: right; cursor: pointer; user-select: none;" onclick="toggleSort()">
                                Schedule Date <span id="sortIcon" style="color: var(--brand); margin-left: 4px;">↑</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="listBody"></tbody>
                </table>
            </div>

            <div id="view-roadmap" class="view-panel">
                <div class="roadmap-container" id="roadmapGrid"></div>
            </div>

            <div id="view-cal" class="view-panel">
                <div class="cal-frame">
                    <div class="cal-header">
                        <h2 class="cal-title" id="calTitle">Month</h2>
                        <div style="display:flex; gap:8px;">
                            <button class="btn" onclick="moveMonth(-1)">Prev</button>
                            <button class="btn" onclick="resetMonth()">Today</button>
                            <button class="btn" onclick="moveMonth(1)">Next</button>
                        </div>
                    </div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="overlay" id="editor">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Campaign Details</div>
                <button class="modal-close" onclick="closeModal()"><svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="modal-body">
                <div class="field-row">
                    <div class="field-col" style="flex: 2;">
                        <label class="field-label">Campaign Title</label>
                        <input type="text" id="inpTitle" class="studio-input" placeholder="e.g. Q2 Launch Strategy">
                    </div>
                    <div class="field-col" style="flex: 1;">
                        <label class="field-label">Content Tag</label>
                        <select id="inpType" class="studio-input">
                            <option value="Standard">Standard</option>
                            <option value="Anchor">Anchor Post</option>
                            <option value="Engagement">Engagement</option>
                            <option value="Educational">Educational</option>
                            <option value="Promotional">Promotional</option>
                        </select>
                    </div>
                </div>
                
                <div class="field" style="margin-top: 20px;">
                    <label class="field-label">Caption / Copy</label>
                    <textarea id="inpCaption" class="studio-input" rows="4" style="resize:vertical;" placeholder="Write your post copy here..."></textarea>
                </div>

                <div class="field">
                    <label class="field-label">Asset Link</label>
                    <input type="url" id="inpLink" class="studio-input" placeholder="https://drive.google.com/...">
                </div>

                <div class="field-row">
                    <div class="field-col">
                        <label class="field-label">Client</label>
                        <select id="inpClient" class="studio-input"></select>
                    </div>
                  <div class="field-col">
                        <label class="field-label">Schedule Date</label>
                        <div style="position: relative; display: flex; align-items: center;">
                            <svg class="icon" style="position: absolute; left: 12px; color: var(--text-muted); pointer-events: none;" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <input type="text" id="inpDate" class="studio-input" style="padding-left: 40px; cursor: pointer; background: white;" placeholder="Select Date & Time">
                        </div>
                    </div>
                </div>
            </div>
           <div class="modal-foot">
                <button class="btn" style="color:#EF4444; border-color:transparent; box-shadow:none;" id="btnDel" onclick="delPost()">Delete</button>
                <div style="display:flex; gap:12px; margin-left: auto;">
                    <button class="btn" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="saveData()">Save Campaign</button>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="cliModal">
        <div class="modal" style="width: 400px;">
            <div class="modal-header">
                <div class="modal-title">Manage Clients</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div style="display:flex; gap:12px; margin-bottom:24px;">
                    <input type="text" id="newCliName" class="studio-input" placeholder="New Client Name" style="margin-bottom:0;">
                    <button class="btn btn-primary" onclick="addCli()">Add</button>
                </div>
                <div class="field-label">Active Roster</div>
                <div id="cliList" style="border:1px solid var(--border); border-radius:8px; overflow:hidden;"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Saved Successfully</div>

    <script>
        // --- 1. FIREBASE INFRASTRUCTURE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDvrE92N_kMbIA8gIO0a0dcYx7-ZUmr7mA",
            authDomain: "adscenes-content.firebaseapp.com",
            projectId: "adscenes-content",
            storageBucket: "adscenes-content.firebasestorage.app",
            messagingSenderId: "613616055800",
            appId: "1:613616055800:web:20fcbe7a3370d5b521120d"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- 2. GLOBAL STATE ---
        let posts = [];
        let clients = ['vigility tech', 'algaenergy'];
        let filter = 'All Clients';
        let editId = null;
        let cDate = new Date();
        let currentUser = null;
        let unsubscribe = null;
        let sortDesc = false;

        // --- 3. AUTH LOGIC ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authOverlay').style.display = 'none';
                loadCloudData();
            } else {
                currentUser = null;
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });

        function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if (!email || !pass) return;
            auth.signInWithEmailAndPassword(email, pass).catch(e => { 
                const errBox = document.getElementById('authError');
                errBox.innerText = e.message; errBox.style.display = 'block'; 
            });
        }
        function logout() { auth.signOut(); }

        // --- 4. SECURE SYNC ENGINE ---
        function loadCloudData() {
            if (!currentUser) return;
            if (unsubscribe) unsubscribe(); 
            
            unsubscribe = db.collection('users').doc(currentUser.uid).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    posts = data.posts || [];
                    // Strict Sync: Never merge with zombies. Only load cloud, or strict default.
                    if (data.clients && data.clients.length > 0) {
                        clients = data.clients;
                    } else {
                        clients = ['vigility tech', 'algaenergy'];
                    }
                    render();
                } else {
                    render(); 
                }
            });
        }

        function persist() {
            if (!currentUser) return;
            render(); 
            db.collection('users').doc(currentUser.uid).set({ posts: posts, clients: clients })
              .catch(e => toast("Error saving to cloud"));
        }

        // --- 5. RENDER ENGINE ---
        function render() {
            const visible = filter === 'All Clients' ? posts : posts.filter(p => p.client === filter);
            document.getElementById('subtitle').innerText = `${visible.length} Active Campaigns`;
            document.getElementById('currentClient').innerText = filter;
            renderListView(visible);
            renderRoadmap(visible);
            renderCal(visible);
            renderClientDropdown();
        }

        function getTagStyles(type) {
            const map = {
                'Anchor': { bg: 'var(--t-anchor-bg)', fg: 'var(--t-anchor-fg)' },
                'Engagement': { bg: 'var(--t-engage-bg)', fg: 'var(--t-engage-fg)' },
                'Educational': { bg: 'var(--t-edu-bg)', fg: 'var(--t-edu-fg)' },
                'Promotional': { bg: 'var(--t-promo-bg)', fg: 'var(--t-promo-fg)' },
                'Standard': { bg: 'var(--t-std-bg)', fg: 'var(--t-std-fg)' }
            };
            return map[type] || map['Standard'];
        }

        function renderTagBadge(type) {
            if (!type || type === 'Standard') return '';
            const style = getTagStyles(type);
            return `<span class="tag-badge" style="background:${style.bg}; color:${style.fg};">${type}</span>`;
        }

        function getStatusBadge(p) {
            const map = { 
                'Draft': { bg: 'var(--s-draft-bg)', fg: 'var(--s-draft-fg)' }, 
                'WIP': { bg: 'var(--s-wip-bg)', fg: 'var(--s-wip-fg)' }, 
                'Ready': { bg: 'var(--s-ready-bg)', fg: 'var(--s-ready-fg)' }, 
                'Posted': { bg: 'var(--s-posted-bg)', fg: 'var(--s-posted-fg)' } 
            };
            const s = map[p.status || 'Draft'];
            return `<div class="status-pill" style="background:${s.bg}; color:${s.fg};" onclick="cycleStatus(event, '${p.id}')"><div class="dot" style="background:${s.fg}"></div>${p.status || 'Draft'}</div>`;
        }

        function renderListView(visible) {
            const tbody = document.getElementById('listBody');
            document.getElementById('sortIcon').innerText = sortDesc ? '↓' : '↑';
            
            if (visible.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-light);">No campaigns found.</td></tr>`;
                return;
            } 
            
            const sorted = [...visible].sort((a, b) => {
                const dA = a.date ? new Date(a.date).getTime() : 0;
                const dB = b.date ? new Date(b.date).getTime() : 0;
                return sortDesc ? dB - dA : dA - dB;
            });

            tbody.innerHTML = sorted.map(p => `
                <tr onclick="edit('${p.id}')">
                    <td>
                        ${renderTagBadge(p.type)}
                        <div class="cell-main">${esc(p.title)}</div>
                        <div class="cell-sub">${esc(p.caption) || 'No caption provided'}</div>
                    </td>
                    <td>${getStatusBadge(p)}</td>
                    <td style="font-weight:500;">${esc(p.client)}</td>
                    <td>${p.link ? `<a href="${p.link}" target="_blank" onclick="event.stopPropagation()" style="color:var(--brand); font-weight:600; text-decoration:none; font-size:13px;">View ↗</a>` : '<span style="color:var(--text-light)">—</span>'}</td>
                    <td style="text-align:right; font-family:monospace; color:var(--text-muted);">${formatDate(p.date)}</td>
                </tr>
            `).join('');
        }

        // MATHEMATICALLY STRICT DATE ENGINE
        function renderRoadmap(list) {
            const backlog = [], thisWeek = [], nextWeek = [], future = [];
            
            const today = new Date(); 
            today.setHours(0,0,0,0);
            const dayOfWeek = today.getDay() === 0 ? 6 : today.getDay() - 1; // Mon=0, Sun=6
            
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - dayOfWeek);
            
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            endOfWeek.setHours(23,59,59,999);
            
            const endOfNextWeek = new Date(endOfWeek);
            endOfNextWeek.setDate(endOfWeek.getDate() + 7);
            
            list.forEach(p => {
                if (!p.date) { backlog.push(p); return; }
                const d = new Date(p.date);
                if (d < startOfWeek) backlog.push(p);
                else if (d >= startOfWeek && d <= endOfWeek) thisWeek.push(p);
                else if (d > endOfWeek && d <= endOfNextWeek) nextWeek.push(p);
                else future.push(p);
            });
            
            const cols = [ 
                { title: "Past / Backlog", list: backlog }, 
                { title: "This Week", list: thisWeek }, 
                { title: "Next Week", list: nextWeek }, 
                { title: "Future", list: future } 
            ];
            
            document.getElementById('roadmapGrid').innerHTML = cols.map(col => `
                <div class="roadmap-col">
                    <div class="col-header">
                        <div class="col-title">${col.title}</div>
                        <div class="col-count">${col.list.length}</div>
                    </div>
                    ${col.list.length ? col.list.map(p => `
                        <div class="road-card" onclick="edit('${p.id}')">
                            <div class="card-meta">
                                <span>${p.date ? formatDate(p.date) : 'No Date'}</span>
                                ${p.status === 'Ready' ? '<span style="color:var(--s-ready-fg);">Ready</span>' : ''}
                            </div>
                            ${renderTagBadge(p.type)}
                            <div class="card-title">${esc(p.title)}</div>
                            <div class="card-snippet">${esc(p.caption) || 'No caption'}</div>
                        </div>
                    `).join('') : '<div class="empty-zone">Clear</div>'}
                </div>
            `).join('');
        }

        function renderCal(list) {
            const mNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('calTitle').innerText = `${mNames[cDate.getMonth()]} ${cDate.getFullYear()}`;
            
            const y = cDate.getFullYear(), m = cDate.getMonth();
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];
            
            let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-head-cell">${d}</div>`).join('');
            for (let i = 0; i < first; i++) html += `<div class="cal-cell" style="background:#F9FAFB;"></div>`;
            
            for (let d = 1; d <= days; d++) {
                const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const has = list.filter(p => p.date && p.date.startsWith(iso));
                html += `
                    <div class="cal-cell ${iso === todayStr ? 'today' : ''}" onclick="openModal('${iso}')">
                        <div class="cal-num">${d}</div>
                        ${has.map(p => {
                            const style = getTagStyles(p.type || 'Standard');
                            return `<div class="cal-event" style="background:${style.bg}; color:${style.fg};" onclick="event.stopPropagation(); edit('${p.id}')">${esc(p.title)}</div>`;
                        }).join('')}
                    </div>`;
            }
            document.getElementById('calGrid').innerHTML = html;
        }

       // --- 6. DATA ACTIONS (Premium Calendar Integration) ---
        let datePicker = null;

        // Initialize the premium calendar on page load
        document.addEventListener('DOMContentLoaded', () => {
            datePicker = flatpickr("#inpDate", {
                enableTime: true,
                dateFormat: "Y-m-d\\TH:i", 
                altInput: true,
                altFormat: "F j, Y at h:i K", 
                time_24hr: false,
                disableMobile: "true", 
                onChange: function() { document.getElementById('inpDate').style.borderColor = "var(--border)"; }
            });
        });

        function openModal(dateStr = null) { 
            editId = null; 
            document.getElementById('inpTitle').value = ''; 
            document.getElementById('inpType').value = 'Standard'; 
            document.getElementById('inpCaption').value = ''; 
            document.getElementById('inpLink').value = ''; 
            
            // Set the premium calendar date dynamically
            let defaultDate = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0,16);
            datePicker.setDate(dateStr ? dateStr + 'T12:00' : defaultDate); 
            
            const sel = document.getElementById('inpClient'); 
            sel.innerHTML = clients.map(c => `<option value="${c}">${c}</option>`).join(''); 
            if (filter !== 'All Clients') sel.value = filter;
            
            document.getElementById('btnDel').style.display = 'none'; 
            document.getElementById('editor').classList.add('active'); 
        }

        function edit(id) { 
            const p = posts.find(x => x.id === id); 
            if (!p) return; 
            editId = id; 
            
            document.getElementById('inpTitle').value = p.title || ''; 
            document.getElementById('inpType').value = p.type || 'Standard'; 
            document.getElementById('inpCaption').value = p.caption || ''; 
            document.getElementById('inpLink').value = p.link || ''; 
            
            // Update the premium calendar with saved data
            datePicker.setDate(p.date ? (p.date.length === 10 ? p.date + 'T12:00' : p.date) : ''); 
            
            const sel = document.getElementById('inpClient'); 
            sel.innerHTML = clients.map(c => `<option value="${c}">${c}</option>`).join(''); 
            sel.value = p.client || clients[0]; 
            
            document.getElementById('btnDel').style.display = 'block'; 
            document.getElementById('editor').classList.add('active'); 
        }

        function saveData() { 
            const p = { 
                id: editId || 'post_' + Date.now(), 
                title: document.getElementById('inpTitle').value.trim() || 'Untitled Campaign', 
                type: document.getElementById('inpType').value || 'Standard',
                caption: document.getElementById('inpCaption').value.trim() || '', 
                link: document.getElementById('inpLink').value.trim() || '', 
                client: document.getElementById('inpClient').value || '', 
                date: document.getElementById('inpDate').value || '', 
                status: editId ? (posts.find(x => x.id === editId)?.status || 'Draft') : 'Draft' 
            }; 
            
            if (editId) posts[posts.findIndex(x => x.id === editId)] = p; 
            else posts.push(p); 
            
            closeModal(); persist(); toast('Saved successfully'); 
        }

        function delPost() { 
            if (confirm('Delete this campaign?')) { 
                posts = posts.filter(x => x.id !== editId); 
                closeModal(); persist(); toast('Campaign deleted'); 
            } 
        }

        function cycleStatus(e, id) { 
            e.stopPropagation(); 
            const cycle = ['Draft', 'WIP', 'Ready', 'Posted', 'Draft']; 
            const idx = posts.findIndex(p => p.id === id); 
            posts[idx].status = cycle[cycle.indexOf(posts[idx].status || 'Draft') + 1]; 
            persist(); 
        }

        // --- 7. CLIENT MANAGER ---
        function renderClientDropdown() {
            document.getElementById('clientPop').innerHTML = `
                <div class="pop-item" style="color:var(--brand); font-weight:700;" onclick="setFilter('All Clients')">All Clients</div>
                <div style="height:1px; background:var(--border); margin:4px 0;"></div>
                ${clients.map(c => `<div class="pop-item" onclick="setFilter('${c}')">${c}</div>`).join('')}
                <div style="height:1px; background:var(--border); margin:4px 0;"></div>
                <div class="pop-item" style="color:var(--text-muted);" onclick="openCliModal()">Manage Clients...</div>
            `;
        }

        function openCliModal() { 
            document.getElementById('clientPop').style.display = 'none'; 
            document.getElementById('cliModal').classList.add('active'); 
            renderCli(); 
        }

        function renderCli() { 
            document.getElementById('cliList').innerHTML = clients.map((c, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border);">
                    <span style="font-weight:500; font-size:14px;">${esc(c)}</span>
                    <button class="btn" style="height:28px; font-size:12px; color:#EF4444; border-color:transparent; box-shadow:none;" onclick="delCli(${i})">Remove</button>
                </div>
            `).join(''); 
        }

        function addCli() { 
            const val = document.getElementById('newCliName').value.trim(); 
            if (val && !clients.includes(val)) { 
                clients.push(val); 
                document.getElementById('newCliName').value = ''; 
                persist(); renderCli(); 
            }
        }

        function delCli(idx) { 
            if (posts.some(p => p.client === clients[idx])) { alert('Cannot remove: Client has active campaigns.'); return; }
            if (confirm('Remove client?')) { clients.splice(idx, 1); persist(); renderCli(); } 
        }

        // --- 8. UTILITIES ---
        function toggleSort() { sortDesc = !sortDesc; render(); }
        function toggle(id) { const el = document.getElementById(id); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
        function setView(v, btn) { document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active')); document.getElementById('view-' + v).classList.add('active'); document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function setFilter(c) { filter = c; render(); document.getElementById('clientPop').style.display = 'none'; }
        function closeModal() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }
        function moveMonth(n) { cDate.setMonth(cDate.getMonth() + n); render(); }
        function resetMonth() { cDate = new Date(); render(); }
        function esc(t) { return t ? t.replace(/</g, "&lt;") : ''; }
        function formatDate(dStr) { if (!dStr) return 'No Date'; const d = new Date(dStr); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', ...(dStr.includes('T') && { hour: 'numeric', minute: '2-digit' }) }); }
        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        window.onclick = (e) => { if (!e.target.closest('.actions')) document.querySelectorAll('.popover').forEach(el => el.style.display = 'none'); };
    </script>
</body>
</html>
